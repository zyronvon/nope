<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Access Granted</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #111 0%, #000 70%);
        font-family: "Orbitron", sans-serif;
        position: relative;
        cursor: crosshair;
      }

      canvas {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .noise {
        position: absolute;
        inset: 0;
        background-image: repeating-radial-gradient(
          circle at 0 0,
          transparent 0,
          rgba(255, 255, 255, 0.03) 1px,
          transparent 2px
        );
        opacity: 0.15;
        mix-blend-mode: soft-light;
        pointer-events: none;
      }

      .container {
        position: relative;
        z-index: 5;
        text-align: center;
        animation: float 4s ease-in-out infinite;
      }

      .finger {
        font-size: clamp(160px, 28vw, 420px);
        line-height: 1;
        user-select: none;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2))
          drop-shadow(0 0 40px rgba(255, 255, 255, 0.15));
        animation:
          pulse 1.6s infinite alternate,
          shake 5s infinite;
        transition: transform 0.08s linear;
      }

      .title {
        margin-top: 20px;
        color: white;
        font-size: clamp(18px, 2vw, 30px);
        letter-spacing: 8px;
        text-transform: uppercase;
        opacity: 0.85;
        position: relative;
        animation: glitch 2s infinite;
      }

      .sub {
        margin-top: 15px;
        color: rgba(255, 255, 255, 0.45);
        font-size: 12px;
        letter-spacing: 4px;
      }

      .scanline {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(255, 255, 255, 0.04) 50%,
          transparent 100%
        );
        background-size: 100% 6px;
        pointer-events: none;
        opacity: 0.25;
      }

      .flash {
        position: absolute;
        inset: 0;
        background: white;
        opacity: 0;
        pointer-events: none;
        animation: flash 8s infinite;
      }

      @keyframes pulse {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.07);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-12px);
        }
      }

      @keyframes shake {
        0%,
        100% {
          rotate: -2deg;
        }
        50% {
          rotate: 2deg;
        }
      }

      @keyframes glitch {
        0% {
          text-shadow:
            2px 0 red,
            -2px 0 cyan;
        }
        25% {
          text-shadow:
            -3px 0 red,
            3px 0 cyan;
        }
        50% {
          text-shadow:
            3px 2px red,
            -3px -2px cyan;
        }
        75% {
          text-shadow:
            -2px -2px red,
            2px 2px cyan;
        }
        100% {
          text-shadow:
            2px 0 red,
            -2px 0 cyan;
        }
      }

      @keyframes flash {
        0%,
        96%,
        100% {
          opacity: 0;
        }
        97% {
          opacity: 0.15;
        }
        98% {
          opacity: 0;
        }
      }

      .enter {
        position: absolute;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.35);
        font-size: 11px;
        letter-spacing: 4px;
        z-index: 5;
        animation: blink 1.4s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 0.2;
        }
        50% {
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bg"></canvas>

    <div class="noise"></div>
    <div class="scanline"></div>
    <div class="flash"></div>

    <div class="container">
      <div class="finger" id="finger">🖕</div>
      <div class="title">WELCOME</div>
      <div class="sub">YOU WERE EXPECTING SOMETHING ELSE?</div>
    </div>

    <div class="enter">MOVE YOUR CURSOR</div>

    <script>
      const canvas = document.getElementById("bg");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = [];

      for (let i = 0; i < 120; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 2,
          speedY: Math.random() * 1 + 0.2,
          opacity: Math.random() * 0.5,
        });
      }

      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach((p) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
          ctx.fill();

          p.y -= p.speedY;

          if (p.y < 0) {
            p.y = canvas.height;
            p.x = Math.random() * canvas.width;
          }
        });

        requestAnimationFrame(animateParticles);
      }

      animateParticles();

      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      const finger = document.getElementById("finger");

      document.addEventListener("mousemove", (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 20;
        const y = (window.innerHeight / 2 - e.clientY) / 20;

        finger.style.transform = `translate(${-x}px, ${-y}px) rotate(${x / 2}deg)`;
      });

      document.addEventListener("click", () => {
        document.body.style.filter = "invert(1)";

        setTimeout(() => {
          document.body.style.filter = "invert(0)";
        }, 120);
      });
    </script>
  </body>
</html>
